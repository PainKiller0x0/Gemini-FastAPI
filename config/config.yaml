# Gemini FastAPI Configuration File

server:
  host: "0.0.0.0"          # Server bind address
  port: 8000               # Server port
  api_key: null            # API key for authentication (null for no auth)
  https:
    enabled: false                     # Enable HTTPS
    key_file: "certs/privkey.pem"      # SSL private key file path
    cert_file: "certs/fullchain.pem"   # SSL certificate file path

cors:
  enabled: true            # Enable CORS
  allow_origins: ["*"]
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

gemini:
  clients:
    - id: "example-id-1"   # Arbitrary client ID
      secure_1psid: "YOUR_SECURE_1PSID_HERE"
      secure_1psidts: "YOUR_SECURE_1PSIDTS_HERE"
      secure_1psidcc: null # Optional __Secure-1PSIDCC cookie, improves authenticated session detection
      cookie_header: null  # Optional full Cookie header from a working Gemini Web session; takes precedence over the three fields above
      proxy: null          # Optional proxy URL (null/empty means direct connection)
  timeout: 600             # Init timeout in seconds (Not less than 30s)
  watchdog_timeout: 300    # Watchdog timeout in seconds (Not less than 30s)
  auto_refresh: true       # Auto-refresh session cookies
  refresh_interval: 600    # Refresh interval in seconds (Not less than 60s)
  warm_generate:
    enabled: false            # Optional: periodically send a tiny real generation to keep Gemini Web warm
    interval: 300             # Warm generation interval in seconds (minimum 60s)
    initial_delay: 20         # Delay before the first warm generation after startup
    model: "gemini-3.5-flash"
    prompt: "只回复一个字：好"
    active_periods: []        # Optional local-time windows, e.g. ["07:00-01:30"]; empty means always on
  verbose: false           # Enable verbose logging for Gemini requests
  max_chars_per_request: 1000000     # Maximum characters Gemini Web accepts per request. Non-pro users might have a lower limit
  oversized_context_strategy: "compaction" # "compaction" summarizes older turns when oversized; "file" sends oversized context as attached file
  chat_mode: "normal"     # "normal" reuses Google chat metadata; "temporary" sends with Google's temporary mode (not saved to account) and uses a 90% effective input limit
  model_strategy: "append" # Strategy: 'append' (default + custom) or 'overwrite' (custom only)
  models:
    # Gemini Web custom model aliases. These headers are not secrets; they map public names to Gemini Web model ids.
    - model_name: "gemini-3.5-flash"
      model_header:
        x-goog-ext-525001261-jspb: '[1,null,null,null,"56fdd199312815e2",null,null,0,[4],null,null,1]'
    - model_name: "gemini-3.1-pro"
      model_header:
        x-goog-ext-525001261-jspb: '[1,null,null,null,"e6fa609c3fa255c0",null,null,0,[4],null,null,1]'

storage:
  path: "data/lmdb"        # Database storage path
  images_path: "data/images" # Image storage path
  max_size: 268435456      # Maximum database size (256 MB)
  retention_days: 14       # Number of days to retain conversations before cleanup

image_generation:
  backend: "disabled"       # "disabled", "gemini_web", "auto", "gemini_api", or "imagen_api"
  model: "gemini-3.1-flash-image-preview" # Gemini native image model; Imagen example: "imagen-4.0-generate-001"
  web_model: "gemini-3.5-flash" # Gemini Web chat model used by backend="gemini_web"
  api_key: null             # Prefer null and set GEMINI_API_KEY in the environment
  api_key_env: "GEMINI_API_KEY"
  gemini_api_base_url: "https://generativelanguage.googleapis.com"
  imagen_api_base_url: "https://generativelanguage.googleapis.com"
  public_base_url: null     # Optional, e.g. "http://127.0.0.1:18000"; null returns b64_json directly

logging:
  level: "INFO"            # Log level: DEBUG, INFO, WARNING, ERROR
